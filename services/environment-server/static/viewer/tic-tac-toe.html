<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tic-Tac-Toe Spectator</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-mono/style.min.css">
  <link rel="stylesheet" href="shared/shared-theme.css?v=2">
  <link rel="stylesheet" href="ttt-styles.css?v=1">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="ttt-container" role="application" aria-label="Tic-Tac-Toe match spectator viewer">
    <canvas id="three-canvas" aria-label="3D visualization of Tic-Tac-Toe match"></canvas>
    <div id="ui-overlay" aria-live="polite">
      <header id="header">
        <img class="brand-logo" src="assets/ui/wordmark.svg" alt="" draggable="false">
        <div id="match-info">
          <span class="game-label">TIC-TAC-TOE</span>
          <span id="turn-counter">Turn 0</span>
          <span id="turn-indicator"></span>
        </div>
        <div id="conn-badge" class="conn-badge connecting">CONNECTING</div>
      </header>

      <div id="game-over-overlay" class="hidden">
        <div id="game-over-content">
          <h1 id="winner-title">VICTORY</h1>
          <div id="winner-name"></div>
          <div id="winner-reason"></div>
        </div>
      </div>

      <div id="connection-status" class="hidden">
        <span class="status-dot"></span>
        <span class="status-text">Reconnecting...</span>
      </div>
    </div>
  </div>
  <script type="module" src="ttt-viewer.js?v=1"></script>
</body>
</html>
