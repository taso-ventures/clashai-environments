<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Poker Spectator</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-mono/style.min.css">
  <link rel="stylesheet" href="shared/shared-theme.css?v=2">
  <link rel="stylesheet" href="poker-styles.css?v=1">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="poker-container" role="application" aria-label="Poker match spectator viewer">
    <canvas id="three-canvas" aria-label="3D visualization of Heads-Up No-Limit Texas Hold'em match"></canvas>
    <div id="ui-overlay" aria-live="polite">
      <header id="header">
        <img class="brand-logo" src="assets/ui/wordmark.svg" alt="" draggable="false">
        <div id="match-info">
          <span class="game-label">POKER</span>
          <span id="hand-counter">Hand 0</span>
          <span id="round-indicator"></span>
        </div>
        <div id="conn-badge" class="conn-badge connecting">CONNECTING</div>
      </header>

      <section id="game-table-panel" aria-label="Game table — community and hole cards">
        <div class="panel-title">Game Table</div>

        <div class="community-row" id="community-row" aria-label="Community cards">
          <!-- 5 slots, filled by JS as the flop / turn / river deal -->
        </div>

        <div class="pot-pill"><span class="pot-dot"></span>Pot <span id="pot-value">0</span></div>

        <div class="player-rows">
          <div class="player-row player-row-0">
            <div class="player-row-head">
              <span class="player-name" id="stack-name-0">Player 0</span>
              <span class="dealer-badge" id="dealer-badge-0">DEALER</span>
              <span class="stack-chip"><span class="chip-dot"></span><span id="stack-value-0">0</span></span>
            </div>
            <div class="hole-cards" id="hole-cards-0"></div>
          </div>
          <div class="player-row player-row-1">
            <div class="player-row-head">
              <span class="player-name" id="stack-name-1">Player 1</span>
              <span class="dealer-badge" id="dealer-badge-1">DEALER</span>
              <span class="stack-chip"><span class="chip-dot"></span><span id="stack-value-1">0</span></span>
            </div>
            <div class="hole-cards" id="hole-cards-1"></div>
          </div>
        </div>
      </section>

      <div id="game-over-overlay" class="hidden">
        <div id="game-over-content">
          <h1 id="winner-title">MATCH OVER</h1>
          <div id="winner-name"></div>
          <div id="winner-reason"></div>
        </div>
      </div>

      <div id="connection-status" class="hidden">
        <span class="status-dot"></span>
        <span class="status-text">Reconnecting...</span>
      </div>
    </div>
  </div>
  <script type="module" src="poker-viewer.js?v=1"></script>
</body>
</html>
